name: Rappel Anniversaires

on:
  schedule:
    # S'exécute tous les jours à 05:00 UTC (6h en France hiver / 7h été) + temps attente file Github = environ 9h
    - cron: '0 5 * * *'
  workflow_dispatch: # Permet de lancer le script manuellement pour tester

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer le script
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python main.py
